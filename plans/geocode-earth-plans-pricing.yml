    type: subscription
    metric: requests
    limit: 400000
    timeFrame: month
    geo: global
    unit: 1
    price: $200/month
    userMultiplied: false
  elements:
  - name: Search
  - name: Autocomplete
  - name: Reverse
  - name: Structured Search
  - name: Place
  - name: Store Results
- id: geocode-earth-advanced
  name: Advanced
