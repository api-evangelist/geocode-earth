    name: included_requests
    type: subscription
    metric: requests
    limit: 150000
    timeFrame: month
    geo: global
    unit: 1
    price: $100/month
    userMultiplied: false
  elements:
  - name: Search
  - name: Autocomplete
  - name: Reverse
  - name: Structured Search
  - name: Place
  - name: Store Results
- id: geocode-earth-basic
