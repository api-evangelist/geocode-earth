  unit: months
  aggregation: sum
  dimensions:
  - account
  - plan
- name: requests
  description: Geocoding requests consumed against the plan's monthly allowance across all endpoints.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - plan
  - endpoint
principles:
- name: Visibility
  description: Track monthly request volume per account against the plan allowance via the Geocode Earth dashboard.
- name: Allocation
  description: Issue separate API keys per workload or team and attribute request counts to internal cost centers.
- name: Optimization
  description: Right-size the subscription tier to actual monthly volume; cache and debounce autocomplete requests to reduce request count, and use the place endpoint to re-resolve known gids instead of re-searching.
- name: Accountability
  description: Assign an owner per project/key and review monthly request burn against the chosen plan before renewal or upgrade.
