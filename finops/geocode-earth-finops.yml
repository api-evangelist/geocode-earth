description: >-
  FinOps view of Geocode Earth spend. Geocode Earth bills a flat monthly
  subscription per plan (Lite, Basic, Advanced) that includes a fixed
  monthly request allowance, rather than per-request pay-as-you-go billing.
  Very high volumes are handled through a Custom enterprise agreement. The
  primary cost lever is choosing the plan whose included request volume
  matches actual monthly usage, since the marginal cost driver is the
  request count consumed across the search, autocomplete, reverse,
  structured, and place endpoints.
notes: >-
  Plan prices and included volumes are subject to change; verify against the
  Geocode Earth pricing page during reconciliation.
