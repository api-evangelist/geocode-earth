aid: geocode-earth
url: https://raw.githubusercontent.com/api-evangelist/geocode-earth/refs/heads/main/apis.yml
name: Geocode Earth
kind: company
description: Geocode Earth is a hosted geocoding and address autocomplete API built
  by the team that maintains Pelias, the open-source geocoder. It provides forward
  (search), autocomplete, reverse, and structured geocoding plus place lookup over
  fully open data (OpenStreetMap, OpenAddresses, Who's on First, and Geonames), with
  results that can be stored without restrictive licensing.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Geocoding
- Address Autocomplete
- Reverse Geocoding
- Mapping
- Pelias
- Open Data
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
